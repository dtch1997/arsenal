# Virtual workspace root — not a package. `uv sync --all-packages` gives one
# venv with every tool (and every CLI) installed editable.
[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = ["pytest>=8"]

# Whole-workspace runs (`pytest packages/*/tests`) resolve config here, not in
# the per-package pyprojects, so markers must be registered in both places.
[tool.pytest.ini_options]
markers = [
    "integration: hits a real rclone remote / GCS bucket; deselect with -m 'not integration'",
]
