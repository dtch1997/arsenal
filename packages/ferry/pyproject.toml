[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ferry-sync"
version = "0.2.0"
description = "Pythonic push/pull between local and any rclone remote, plus a content-addressed GCS file store (ferry.cas)."
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
authors = [{ name = "Daniel Tan" }]
keywords = ["rclone", "sync", "gcs", "s3", "storage"]
dependencies = []

[project.optional-dependencies]
gcs = ["google-cloud-storage"]
dev = ["pytest"]

[project.scripts]
ferry = "ferry.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ferry"]

[tool.pytest.ini_options]
markers = [
    "integration: hits a real rclone remote / GCS bucket; deselect with -m 'not integration'",
]
