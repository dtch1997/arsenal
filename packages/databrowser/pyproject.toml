[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "databrowser"
version = "0.2.0"
description = "Minimal JSONL data browser: validate, build a static HTML browser, serve it through the shared lobby hub."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
license-files = ["LICENSE"]
dependencies = ["lobby @ git+https://github.com/dtch1997/lobby"]

[project.scripts]
databrowser = "databrowser.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["databrowser"]

[tool.hatch.build.targets.wheel.force-include]
"databrowser/browser.html" = "databrowser/browser.html"

[tool.hatch.metadata]
allow-direct-references = true
