[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cairn"
version = "0.2.0"
description = "A minimal, git-friendly dependency-aware issue graph for coding agents. Stdlib only."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Daniel Tan" }]
keywords = ["issue-tracker", "agents", "cli", "dependency-graph", "task-management"]
dependencies = []

[project.scripts]
cairn = "cairn.cli:main"

[project.optional-dependencies]
dev = ["pytest>=7"]

[tool.hatch.build.targets.wheel]
packages = ["cairn"]

[tool.pytest.ini_options]
testpaths = ["tests"]
