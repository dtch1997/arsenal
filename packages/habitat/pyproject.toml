[project]
name = "habitat"
version = "0.1.0"
description = "Personal habit tracker on a long-lived RunPod CPU pod: celebrate what you did, not what you skipped. Stdlib-only server pushed to the pod; devbox client for provision/deploy/backup."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Daniel Tan" }]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8"]

[project.scripts]
habitat = "habitat.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/habitat"]
