[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arxivist"
version = "0.1.0"
description = "Download arXiv papers and parse them into structured, agent-legible markdown (HTML-first, PDF fallback)."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "Daniel Tan" }]
keywords = ["arxiv", "papers", "pdf", "parsing", "llm", "agents"]
dependencies = [
    "httpx>=0.27",
    "beautifulsoup4>=4.12",
    "pymupdf4llm>=0.0.17",
]

[project.optional-dependencies]
dev = ["pytest"]

[project.scripts]
arxivist = "arxivist.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/arxivist"]
